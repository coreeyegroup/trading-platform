services:

  trend_strategy_service:
    path: services/trend-strategy-service
    start_command: python3 service.py
    restart: true
    depends_on: []

  signal_validator:
    path: services/signal-validator
    start_command: python3 service.py
    restart: true
    depends_on:
      - trend_strategy_service

  policy_engine:
    path: services/policy-engine
    start_command: python3 service.py
    restart: true
    depends_on:
      - signal_validator

  risk_engine:
  command: python services/risk-engine/risk_engine.py
  enabled: true


